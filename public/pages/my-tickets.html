<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的工单 - 工单反馈系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1 class="page-title">📋 我的工单</h1>
        <p class="page-subtitle">查看你提交的所有反馈及处理状态</p>
      </div>
      <a href="/pages/submit.html" class="btn btn-primary">✏️ 提交新工单</a>
    </div>

    <div class="filter-bar">
      <label>状态筛选：</label>
      <select id="statusFilter" onchange="loadTickets()">
        <option value="all">全部</option>
        <option value="pending">⏳ 待处理</option>
        <option value="processing">🔧 处理中</option>
        <option value="resolved">✅ 已解决</option>
        <option value="closed">🔒 已关闭</option>
      </select>
    </div>

    <div class="ticket-list" id="ticketList">
      <div class="empty-state">
        <div class="empty-icon">⏳</div>
        <div class="empty-title">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 工单详情模态框 -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">工单详情</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let currentUser = null;
    let allTickets = [];

    (async () => {
      currentUser = await requireAuth();
      if (!currentUser) return;
      renderNavbar('my');
      await loadTickets();
    })();

    async function loadTickets() {
      const filter = document.getElementById('statusFilter').value;
      try {
        const data = await api('/api/tickets/mine');
        allTickets = data.tickets;
        const filtered = filter === 'all' ? allTickets : allTickets.filter(t => t.status === filter);
        renderTickets(filtered);
      } catch(err) {
        document.getElementById('ticketList').innerHTML = `<div class="alert alert-error">❌ ${err.message}</div>`;
      }
    }

    function renderTickets(tickets) {
      const list = document.getElementById('ticketList');
      if (tickets.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-title">暂无工单</div>
            <div class="empty-desc">你还没有提交过反馈，点击下方按钮开始</div>
            <a href="/pages/submit.html" class="btn btn-primary">✏️ 提交第一个工单</a>
          </div>
        `;
        return;
      }
      list.innerHTML = tickets.map(t => renderTicketCard(t)).join('');
    }

    // 详情模态框
    window.handleTicketDetail = function(id) {
      const ticket = allTickets.find(t => t.id === id);
      if (!ticket) return;
      const status = STATUS_MAP[ticket.status];
      const priority = PRIORITY_MAP[ticket.priority];
      const category = CATEGORY_MAP[ticket.category];

      document.getElementById('modalTitle').textContent = `工单 #${String(ticket.id).padStart(4, '0')}`;
      document.getElementById('modalBody').innerHTML = `
        <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
          <span class="tag ${priority.class}">${priority.icon} ${priority.label}</span>
          <span class="tag ${status.class}">${status.icon} ${status.label}</span>
          <span class="tag tag-category">${category}</span>
        </div>
        <h3 style="font-size:22px;margin-bottom:12px">${escapeHtml(ticket.title)}</h3>
        <div style="color:var(--text-mute);font-size:13px;margin-bottom:16px">
          🕐 提交时间：${ticket.created_at}${ticket.updated_at !== ticket.created_at ? ' · 更新：' + ticket.updated_at : ''}
        </div>
        <div style="padding:16px;border-radius:12px;background:var(--inset-light);box-shadow:var(--inset-shadow);margin-bottom:16px;line-height:1.7">
          ${escapeHtml(ticket.content).replace(/\n/g, '<br>')}
        </div>
        ${ticket.reply ? `
          <div class="ticket-reply-box">
            <strong>💬 管理员回复</strong>
            <div style="margin-top:6px">${escapeHtml(ticket.reply).replace(/\n/g, '<br>')}</div>
          </div>
        ` : '<div class="alert alert-info">⏳ 管理员尚未回复，请耐心等待</div>'}
      `;

      let footer = '';
      if (ticket.status === 'pending') {
        footer = `<button class="btn btn-danger btn-sm" onclick="deleteTicket(${ticket.id})">🗑 删除工单</button>`;
      }
      document.getElementById('modalFooter').innerHTML = footer + `<button class="btn btn-ghost btn-sm" onclick="closeModal()">关闭</button>`;
      document.getElementById('detailModal').classList.add('show');
    }

    async function deleteTicket(id) {
      if (!confirm('确定要删除这个工单吗？此操作不可撤销。')) return;
      try {
        await api(`/api/tickets/${id}`, { method: 'DELETE' });
        showToast('工单已删除', 'success');
        closeModal();
        await loadTickets();
      } catch(err) {
        showToast(err.message, 'error');
      }
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('show');
    }

    document.getElementById('detailModal').addEventListener('click', (e) => {
      if (e.target.id === 'detailModal') closeModal();
    });
  </script>
</body>
</html>
