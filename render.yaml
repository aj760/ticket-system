# Render 蓝图部署配置
# 使用方式：把代码推到 GitHub，在 Render 后台选 "New > Blueprint" 选择仓库即可
services:
  - type: web
    name: ticket-feedback-system
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/me
    envVars:
      - key: DATABASE_URL
        sync: false  # 部署时需手动填入 Neon 数据库连接串
      - key: SESSION_SECRET
        generateValue: true
      - key: PGSSL
        value: "false"
